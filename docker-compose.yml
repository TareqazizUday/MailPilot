# PostgreSQL 16 with pgvector (CREATE EXTENSION vector) — use this instead of plain postgres:16.
# If Windows native Postgres already uses 5432, stop it or change ports below and set DJANGO_DB_PORT.
# See docs/kb-pgvector-setup.md
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mailpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailpilot
      POSTGRES_USER: mailpilot_user
      POSTGRES_PASSWORD: mailpilot_password
    ports:
      - "5432:5432"
    volumes:
      - mailpilot_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  mailpilot_pg_data:
