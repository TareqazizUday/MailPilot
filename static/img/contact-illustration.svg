<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none" role="img" aria-label="MailPilot inbox automation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1432"/>
      <stop offset="1" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="card" x1="60" y1="40" x2="420" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e2a5a"/>
      <stop offset="1" stop-color="#12182e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4f6ef7"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="320" rx="24" fill="url(#bg)"/>
  <circle cx="400" cy="60" r="80" fill="#4f6ef7" fill-opacity="0.12"/>
  <circle cx="80" cy="260" r="60" fill="#a78bfa" fill-opacity="0.1"/>
  <rect x="48" y="36" width="384" height="248" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <rect x="72" y="56" width="120" height="10" rx="5" fill="url(#accent)" opacity="0.9"/>
  <rect x="72" y="76" width="200" height="8" rx="4" fill="#64748b" opacity="0.5"/>
  <rect x="72" y="108" width="336" height="52" rx="12" fill="rgba(79,110,247,0.12)" stroke="rgba(79,110,247,0.35)"/>
  <circle cx="96" cy="134" r="14" fill="url(#accent)" opacity="0.85"/>
  <rect x="120" y="122" width="140" height="8" rx="4" fill="#e2e8f0" opacity="0.85"/>
  <rect x="120" y="138" width="220" height="6" rx="3" fill="#94a3b8" opacity="0.6"/>
  <rect x="72" y="176" width="336" height="52" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <circle cx="96" cy="202" r="14" fill="#334155"/>
  <rect x="120" y="190" width="100" height="8" rx="4" fill="#94a3b8" opacity="0.7"/>
  <rect x="120" y="206" width="180" height="6" rx="3" fill="#64748b" opacity="0.5"/>
  <rect x="72" y="244" width="100" height="28" rx="14" fill="url(#accent)" filter="url(#glow)"/>
  <rect x="82" y="252" width="80" height="12" rx="6" fill="#fff" opacity="0.9"/>
  <g transform="translate(360 52)">
    <circle r="28" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
    <path d="M-8 2 L-2 8 L10 -6" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(380 200)">
    <circle r="32" fill="rgba(167,139,250,0.2)" stroke="url(#accent)" stroke-width="2"/>
    <path d="M-6 -8 L6 -8 L0 8 Z" fill="url(#accent)" opacity="0.9"/>
    <circle cy="-2" r="3" fill="#fff"/>
  </g>
</svg>
