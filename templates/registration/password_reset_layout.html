<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block page_title %}MailPilot{% endblock %}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060818;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.1);
      --danger-bg: rgba(251,113,133,0.10);
      --danger-border: rgba(251,113,133,0.25);
    }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .orb1 { width: 600px; height: 600px; background: rgba(79,110,247,0.13); top: -200px; left: -150px; }
    .orb2 { width: 500px; height: 500px; background: rgba(167,139,250,0.10); bottom: -100px; right: -150px; }
    .orb3 { width: 350px; height: 350px; background: rgba(56,189,248,0.07); top: 40%; left: 50%; }
    .page-wrapper { position: relative; z-index: 1; min-height: 100vh; display: grid; grid-template-columns: 1fr; }
    .right-panel { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 56px 48px; }
    .form-box { width: 100%; max-width: 420px; animation: fadeUp 0.8s 0.15s ease both; }
    .form-header { margin-bottom: 26px; }
    .form-title { font-size: 1.9rem; font-weight: 900; letter-spacing: -1px; line-height: 1.15; }
    .form-title span { background: linear-gradient(135deg, #4f6ef7, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .form-sub { color: var(--muted); font-size: 0.9rem; margin-top: 8px; line-height: 1.5; }
    .form-sub a { color: #a78bfa; font-weight: 600; text-decoration: none; }
    .form-sub a:hover { text-decoration: underline; }
    .err {
      margin: 16px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: #fecdd3;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .input-wrap { position: relative; }
    .input-wrap .icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 1rem; pointer-events: none;
    }
    .input-wrap input {
      width: 100%; padding: 13px 14px 13px 42px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px; color: var(--text);
      font-size: 0.9rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: rgba(79,110,247,0.6);
      background: rgba(79,110,247,0.06);
      box-shadow: 0 0 0 3px rgba(79,110,247,0.12);
    }
    ul.errorlist {
      list-style: none; margin: 8px 0 0; padding: 0;
      font-size: 0.74rem; color: #f87171; font-weight: 600;
    }
    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4f6ef7, #a78bfa);
      border: none; border-radius: 14px;
      color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(79,110,247,0.35);
      font-family: 'Inter', sans-serif;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(79,110,247,0.5); }
    .bottom-link { text-align: center; margin-top: 18px; font-size: 0.85rem; color: var(--muted); }
    .bottom-link a { color: #a78bfa; font-weight: 600; text-decoration: none; }
    .bottom-link a:hover { text-decoration: underline; }
    .code-inline {
      font-family: ui-monospace, monospace;
      font-size: 0.85em;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .muted-box {
      padding: 14px 16px; border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted); font-size: 0.88rem; line-height: 1.55;
    }
    .muted-box a { color: #a78bfa; font-weight: 600; text-decoration: none; }
    .muted-box a:hover { text-decoration: underline; }
    .flash {
      margin-bottom: 16px; padding: 12px 14px; border-radius: 14px;
      font-size: 0.85rem; font-weight: 600; line-height: 1.4;
    }
    .flash.flash-debug, .flash.flash-info { background: rgba(79,110,247,0.12); border: 1px solid rgba(79,110,247,0.28); color: #c7d2fe; }
    .flash.flash-success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.28); color: #bbf7d0; }
    .flash.flash-warning { background: rgba(251,191,36,0.10); border: 1px solid rgba(251,191,36,0.28); color: #fde68a; }
    .flash.flash-error { background: var(--danger-bg); border: 1px solid var(--danger-border); color: #fecdd3; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 900px) {
      .right-panel { padding: 40px 28px; min-height: 100vh; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="orb orb1" aria-hidden="true"></div>
<div class="orb orb2" aria-hidden="true"></div>
<div class="orb orb3" aria-hidden="true"></div>
{% include "components/toasts.html" with toast_top="18px" %}
<div class="page-wrapper">
  <div class="right-panel">
    <div class="form-box">
      {% block body %}{% endblock %}
    </div>
  </div>
</div>
</body>
</html>
