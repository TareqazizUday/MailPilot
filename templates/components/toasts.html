{# Reusable right-side toast popup for Django messages #}
<style>
  .toasts{
    position: fixed;
    right: 18px;
    top: var(--toast-top, 18px);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }
  .toast{
    pointer-events: none;
    min-width: 280px;
    max-width: 360px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(13,18,48,0.92);
    backdrop-filter: blur(18px);
    box-shadow: 0 18px 60px rgba(0,0,0,.55);
    color: rgba(226,232,240,0.95);
    font-size: 0.86rem;
    font-weight: 650;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: toastIn .18s ease both;
  }
  .toast .ico{
    width: 20px;
    height: 20px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    margin-top: 1px;
    background: rgba(34,197,94,0.18);
    border: 1px solid rgba(34,197,94,0.28);
    color: #4ade80;
    font-weight: 900;
    font-size: 12px;
  }
  .toast.toast-error .ico{
    background: rgba(251,113,133,0.14);
    border-color: rgba(251,113,133,0.26);
    color: #fb7185;
  }
  .toast.toast-warning .ico{
    background: rgba(251,191,36,0.14);
    border-color: rgba(251,191,36,0.26);
    color: #fbbf24;
  }
  .toastOut{ animation: toastOut .16s ease both; }
  @keyframes toastIn { from{opacity:0; transform:translateX(18px);} to{opacity:1; transform:translateX(0);} }
  @keyframes toastOut{ from{opacity:1; transform:translateX(0);} to{opacity:0; transform:translateX(18px);} }
</style>

<div class="toasts" id="toasts" style="--toast-top: {{ toast_top|default:'18px' }};" aria-live="polite" aria-atomic="true"></div>

{% if messages %}
  <div id="djMsgs" style="display:none">
    {% for message in messages %}
      <div class="djMsg" data-level="{{ message.level_tag }}" data-text="{{ message|escapejs }}"></div>
    {% endfor %}
  </div>
{% endif %}

<script>
  (function(){
    const holder = document.getElementById('djMsgs');
    const host = document.getElementById('toasts');
    if(!holder || !host) return;
    const nodes = Array.from(holder.querySelectorAll('.djMsg'));
    nodes.forEach(n => {
      const level = (n.getAttribute('data-level') || 'info').toLowerCase();
      const text = n.getAttribute('data-text') || '';
      if(!text) return;
      const t = document.createElement('div');
      t.className = 'toast toast-' + level;
      const ico = document.createElement('div');
      ico.className = 'ico';
      const cls = (level === 'error') ? 'fa-solid fa-triangle-exclamation'
                : (level === 'warning') ? 'fa-solid fa-triangle-exclamation'
                : 'fa-solid fa-check';
      ico.innerHTML = '<i class=\"' + cls + '\" aria-hidden=\"true\"></i>';
      const msg = document.createElement('div');
      msg.textContent = text;
      t.appendChild(ico);
      t.appendChild(msg);
      host.appendChild(t);
      setTimeout(() => {
        t.classList.add('toastOut');
        setTimeout(() => { try{ t.remove(); }catch(e){} }, 220);
      }, 3000);
    });
  })();
</script>
