<script>
(function () {
  const section = document.getElementById('pricing') || document.querySelector('main.mp-marketing-main');
  if (!section) return;

  const buttons = Array.from(section.querySelectorAll('.pricing-billing-btn[data-billing-interval]'));
  const cards = Array.from(section.querySelectorAll('.pricing-card[data-plan]'));
  if (!buttons.length) return;

  let userPickedInterval = false;

  function csrfToken() {
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : '';
  }

  function normalizeCurrency(raw) {
    const value = String(raw || '').trim().toLowerCase();
    if (value === 'gbp' || value === 'gb' || value === 'uk' || value === '£') return 'gbp';
    if (value === 'eur' || value === 'eu' || value === '€') return 'eur';
    return 'usd';
  }

  function getActiveCurrency() {
    if (window.__mailpilotPricingCurrency) {
      return normalizeCurrency(window.__mailpilotPricingCurrency);
    }
    const fromData = (section.dataset.initialPricingCurrency || '').trim().toLowerCase();
    if (fromData) return normalizeCurrency(fromData);
    return 'usd';
  }

  function getActiveInterval() {
    if (window.__mailpilotBillingInterval) {
      return window.__mailpilotBillingInterval;
    }
    const active = buttons.find((btn) => btn.classList.contains('is-active'));
    return (active && active.dataset.billingInterval) || 'monthly';
  }

  function getPageInitialInterval() {
    try {
      const params = new URLSearchParams(window.location.search);
      const fromUrl = params.get('interval') || params.get('billing_interval');
      if (fromUrl) return fromUrl === 'yearly' ? 'yearly' : 'monthly';
    } catch (e) { /* ignore */ }
    const fromData = (section.dataset.initialBillingInterval || '').trim().toLowerCase();
    if (fromData === 'yearly' || fromData === 'monthly') return fromData;
    return null;
  }

  function getPageInitialCurrency() {
    try {
      const params = new URLSearchParams(window.location.search);
      const fromUrl = params.get('currency');
      if (fromUrl) return normalizeCurrency(fromUrl);
    } catch (e) { /* ignore */ }
    const fromData = (section.dataset.initialPricingCurrency || '').trim();
    if (fromData) return normalizeCurrency(fromData);
    return null;
  }

  function updateCheckoutLinks(interval, currency) {
    section.querySelectorAll('a.pricing-cta').forEach((link) => {
      try {
        const url = new URL(link.getAttribute('href'), window.location.origin);
        if (interval === 'yearly') {
          url.searchParams.set('interval', 'yearly');
        } else {
          url.searchParams.delete('interval');
        }
        if (currency && currency !== 'usd') {
          url.searchParams.set('currency', currency);
        } else {
          url.searchParams.delete('currency');
        }
        link.setAttribute('href', url.pathname + url.search);
      } catch (e) { /* ignore */ }
    });
  }

  async function persistInterval(interval) {
    try {
      await fetch('/api/billing/set-interval', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken() },
        body: JSON.stringify({ interval }),
      });
    } catch (e) { /* ignore */ }
    document.dispatchEvent(new CustomEvent('mailpilot:billing-interval', { detail: { interval } }));
  }

  function applyCardPrices(interval, currency) {
    if (!cards.length) return;
    const billingPrefix = interval === 'yearly' ? 'yearly' : 'monthly';
    const currencySuffix = currency === 'usd' ? '' : '-' + currency;

    cards.forEach((card) => {
      const price = card.dataset[billingPrefix + 'Price' + currencySuffix] || card.dataset[billingPrefix + 'Price'] || '';
      const suffix = card.dataset[billingPrefix + 'Suffix' + currencySuffix] || card.dataset[billingPrefix + 'Suffix'] || '';
      const was = card.dataset[billingPrefix + 'Was' + currencySuffix] || card.dataset[billingPrefix + 'Was'] || '';
      const save = card.dataset[billingPrefix + 'Save' + currencySuffix] || card.dataset[billingPrefix + 'Save'] || '';
      const period = card.dataset[billingPrefix + 'Period' + currencySuffix] || card.dataset[billingPrefix + 'Period'] || '';

      const wasRow = card.querySelector('[data-pricing-was-row]');
      const simpleRow = card.querySelector('[data-pricing-simple-row]');
      const wasEl = card.querySelector('[data-pricing-was]');
      const saveEl = card.querySelector('[data-pricing-save]');
      const periodEl = card.querySelector('[data-pricing-period]');

      if (periodEl) periodEl.textContent = period;

      if (was) {
        if (wasRow) wasRow.hidden = false;
        if (simpleRow) simpleRow.hidden = true;
        if (wasEl) wasEl.textContent = was;
        const priceEl = wasRow && wasRow.querySelector('[data-pricing-price]');
        const suffixEl = wasRow && wasRow.querySelector('[data-pricing-suffix]');
        if (priceEl) priceEl.textContent = price;
        if (suffixEl) suffixEl.textContent = suffix;
        if (saveEl) {
          saveEl.textContent = save;
          saveEl.hidden = !save;
        }
      } else {
        if (wasRow) wasRow.hidden = true;
        if (simpleRow) simpleRow.hidden = false;
        const priceEl = simpleRow && simpleRow.querySelector('[data-pricing-price-simple]');
        const suffixEl = simpleRow && simpleRow.querySelector('[data-pricing-suffix-simple]');
        if (priceEl) priceEl.textContent = price;
        if (suffixEl) suffixEl.textContent = suffix;
      }
    });
  }

  function applyInterval(interval, options) {
    const opts = options || {};
    const normalized = interval === 'yearly' ? 'yearly' : 'monthly';
    const currency = getActiveCurrency();

    window.__mailpilotBillingInterval = normalized;
    updateCheckoutLinks(normalized, currency);

    buttons.forEach((btn) => {
      const on = btn.dataset.billingInterval === normalized;
      btn.classList.toggle('is-active', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });

    applyCardPrices(normalized, currency);

    if (opts.persist !== false) {
      persistInterval(normalized);
    }
  }

  function applyCurrency(currency, options) {
    const opts = options || {};
    const normalized = normalizeCurrency(currency);
    window.__mailpilotPricingCurrency = normalized;
    applyCardPrices(getActiveInterval(), normalized);
    updateCheckoutLinks(getActiveInterval(), normalized);
    document.dispatchEvent(new CustomEvent('mailpilot:pricing-currency', { detail: { currency: normalized } }));
    if (opts.persist === false) return;
    fetch('/api/billing/currency', { credentials: 'same-origin' })
      .then((res) => res.json())
      .then((payload) => {
        const current = payload && payload.ok ? payload.currency : normalized;
        if (normalizeCurrency(current) !== normalized) {
          return fetch('/api/billing/set-currency', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken() },
            body: JSON.stringify({ currency: normalized }),
          });
        }
      })
      .catch(() => { /* ignore */ });
  }

  buttons.forEach((btn) => {
    btn.addEventListener('click', function () {
      userPickedInterval = true;
      applyInterval(btn.dataset.billingInterval || 'monthly');
    });
  });

  const pageInterval = getPageInitialInterval();
  const pageCurrency = getPageInitialCurrency();

  if (pageCurrency) {
    applyCurrency(pageCurrency, { persist: false });
  } else {
    fetch('/api/billing/currency', { credentials: 'same-origin' })
      .then((res) => res.json())
      .then((payload) => {
        const currency = (payload && payload.ok && payload.currency) ? payload.currency : 'usd';
        applyCurrency(currency, { persist: false });
      })
      .catch(() => applyCurrency('usd', { persist: false }));
  }

  if (pageInterval && !userPickedInterval) {
    applyInterval(pageInterval, { persist: false });
  } else {
    fetch('/api/billing/interval', { credentials: 'same-origin' })
      .then((res) => res.json())
      .then((payload) => {
        if (userPickedInterval) return;
        const interval = (payload && payload.ok && payload.interval) ? payload.interval : 'monthly';
        applyInterval(interval, { persist: false });
      })
      .catch(() => {
        if (!userPickedInterval) applyInterval('monthly', { persist: false });
      });
  }

  window.getMailpilotBillingInterval = getActiveInterval;
  window.getMailpilotPricingCurrency = getActiveCurrency;
  window.mailpilotCheckoutUrlWithInterval = function (baseUrl) {
    const interval = getActiveInterval();
    const currency = getActiveCurrency();
    try {
      const url = new URL(baseUrl, window.location.origin);
      if (interval === 'yearly') {
        url.searchParams.set('interval', 'yearly');
      } else {
        url.searchParams.delete('interval');
      }
      if (currency !== 'usd') {
        url.searchParams.set('currency', currency);
      } else {
        url.searchParams.delete('currency');
      }
      return url.pathname + url.search;
    } catch (e) {
      let out = baseUrl;
      if (interval === 'yearly') {
        out += (out.indexOf('?') >= 0 ? '&' : '?') + 'interval=yearly';
      }
      if (currency !== 'usd') {
        out += (out.indexOf('?') >= 0 ? '&' : '?') + 'currency=' + currency;
      }
      return out;
    }
  };
})();
</script>
