<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><title>New contact | MailPilot</title></head>
  <body style="margin:0;padding:24px;background:#f1f5f9;font-family:Inter,Segoe UI,Arial,sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;margin:0 auto;background:#fff;border-radius:12px;border:1px solid #e2e8f0;">
      <tr>
        <td style="padding:24px;">
          <h1 style="margin:0 0 8px;font-size:20px;color:#0f172a;">New contact form message</h1>
          <p style="margin:0 0 16px;color:#64748b;font-size:14px;">Submission #{{ submission_id }}</p>
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="font-size:14px;color:#334155;">
            <tr><td style="padding:6px 0;font-weight:600;width:90px;">Name</td><td>{{ name }}</td></tr>
            <tr><td style="padding:6px 0;font-weight:600;">Email</td><td><a href="mailto:{{ email }}">{{ email }}</a></td></tr>
            {% if phone %}<tr><td style="padding:6px 0;font-weight:600;">Phone</td><td>{{ phone }}</td></tr>{% endif %}
          </table>
          <p style="margin:16px 0 8px;font-weight:600;font-size:14px;color:#0f172a;">Message</p>
          <p style="padding:12px;background:#f8fafc;border-radius:8px;white-space:pre-wrap;font-size:14px;line-height:1.6;color:#334155;margin:0;">{{ message }}</p>
        </td>
      </tr>
    </table>
  </body>
</html>
