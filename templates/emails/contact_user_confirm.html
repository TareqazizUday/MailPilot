<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>We received your message — MailPilot</title>
  </head>
  <body style="margin:0;padding:0;background:#060818;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#060818;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="560" style="width:560px;max-width:100%;">
            <tr>
              <td style="padding:14px 6px 18px;color:#e2e8f0;font-family:Inter,Segoe UI,Arial,sans-serif;">
                <div style="font-weight:900;font-size:18px;">
                  <span style="background:linear-gradient(135deg,#4f6ef7,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;">MailPilot</span>
                </div>
              </td>
            </tr>
            <tr>
              <td style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:18px;padding:22px 20px;font-family:Inter,Segoe UI,Arial,sans-serif;color:#e2e8f0;">
                <p style="margin:0 0 12px;color:#94a3b8;font-size:14px;line-height:1.55;">
                  Hello <strong style="color:#e2e8f0;">{{ name }}</strong>,
                </p>
                <p style="margin:0 0 12px;font-size:16px;font-weight:800;">We received your message</p>
                <p style="margin:0 0 16px;color:#94a3b8;font-size:14px;line-height:1.65;">
                  Thanks for reaching out. Our team typically replies within one business day.
                </p>
                <p style="margin:0 0 8px;font-size:13px;font-weight:700;color:#a5b4fc;">Your message</p>
                <div style="padding:12px;background:rgba(0,0,0,0.2);border-radius:10px;white-space:pre-wrap;font-size:14px;line-height:1.6;color:#cbd5e1;">{{ message }}</div>
                <p style="margin:16px 0 0;color:#64748b;font-size:12px;line-height:1.5;">
                  If you did not submit this form, you can ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
